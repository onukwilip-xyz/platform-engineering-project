---
# Daily base backup — taken every night at midnight UTC.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily-backup
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: postgres-cluster
  immediate: false
---
# Weekly base backup — taken every Sunday at midnight UTC.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-weekly-backup
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "0 0 * * 0"
  backupOwnerReference: self
  cluster:
    name: postgres-cluster
  immediate: false