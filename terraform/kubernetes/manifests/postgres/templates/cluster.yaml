apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 3

  postgresql:
    parameters:
      pg_stat_statements.track: "all"
      max_connections: "200"
      shared_buffers: "1GB"

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          cnpg.io/cluster: postgres-cluster

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
    
  priorityClassName: postgres-cluster-high

  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  minSyncReplicas: 1
  maxSyncReplicas: 1

  certificates:
    serverTLSSecret: postgres-server-tls
    serverCASecret: postgres-server-ca

  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1100m"
      memory: "5Gi"

  storage:
    size: 10Gi
    storageClass: standard-rwo

  walStorage:
    size: 10Gi
    storageClass: standard-rwo

  podAnnotations:
    sidecar.istio.io/inject: "false"

  serviceAccountTemplate:
    metadata:
      annotations:
        iam.gke.io/gcp-service-account: {{ .Values.backup.gcpServiceAccount | quote }}

  backup:
    barmanObjectStore:
      destinationPath: "gs://{{ .Values.backup.bucketName }}/postgres-cluster"
      googleCredentials:
        gkeEnvironment: true
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        immediateCheckpoint: false
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true

  {{- if .Values.databases }}
  managed:
    roles:
      {{- range .Values.databases }}
      - name: {{ .owner | quote }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ .passwordSecretName | quote }}
      {{- end }}
  {{- end }}
