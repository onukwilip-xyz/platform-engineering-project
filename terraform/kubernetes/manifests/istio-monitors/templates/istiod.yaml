apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istiod
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.istiodNamespace }}
  selector:
    matchLabels:
      istio: pilot
  endpoints:
    - port: http-monitoring
      interval: {{ .Values.scrapeInterval }}