apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ztunnel
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.ztunnelNamespace }}
  selector:
    matchLabels:
      app: ztunnel
  podMetricsEndpoints:
    - port: stats-prom
      path: /metrics
      interval: {{ .Values.scrapeInterval }}