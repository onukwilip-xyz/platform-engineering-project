apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    # Wave 0: operator (and its CRDs) must be healthy before the cluster
    # manifests (wave 1) attempt to create Cluster/Pooler resources.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    # Pinned chart version — update via PR to roll the operator forward.
    targetRevision: 0.23.0
    helm:
      values: |
        config:
          clusterWide: true
        monitoring:
          podMonitorEnabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Namespace created by cnpg-system-namespace.yaml in wave -1.
      - CreateNamespace=false
      # ServerSideApply avoids annotation-too-long errors on large CRDs.
      - ServerSideApply=true