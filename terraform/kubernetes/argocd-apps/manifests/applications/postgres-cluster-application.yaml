apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-cluster
  namespace: argocd
  annotations:
    # Wave 1: CNPG CRDs (installed by wave 0) must exist before ArgoCD
    # attempts to apply Cluster, Pooler, and ScheduledBackup resources.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/onukwilip-xyz/platform-engineering-project.git
    targetRevision: HEAD
    path: terraform/kubernetes/manifests/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # postgres namespace is created by namespace.yaml (sync-wave -2) in the
      # manifests directory — do not rely on ArgoCD auto-creating it.
      - CreateNamespace=false
      - ServerSideApply=true